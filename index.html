<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>CoffeSenai - Gestão de Pedidos</title>
    <style>
        body { font-family: sans-serif; margin: 20px; background-color: #f4f4f4; }
        .container { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); width: 450px; }
        input, button { display: block; width: 100%; margin-bottom: 10px; padding: 8px; box-sizing: border-box; }
        button { background: #5d4037; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background: #3e2723; }
        h2 { color: #5d4037; border-bottom: 2px solid #eee; padding-bottom: 5px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; font-size: 13px; }
        th { background-color: #f9f9f9; }
        .btn-excluir { background: #c62828; padding: 4px; font-size: 11px; width: auto; }
        .btn-excluir:hover { background: #b71c1c; }
        .btn-busca { background: #2e7d32; }
        .btn-busca:hover { background: #1b5e20; }
        #msgPedido, #msgBusca { margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <h1 style="text-align: center;">☕ CoffeSenai - Feito pra um break de programadores</h1>

    <div class="container">
        <div class="card">
            <h2>Novo Cliente</h2>
            <input type="text" id="cliNome" placeholder="Nome do Cliente">
            <input type="email" id="cliEmail" placeholder="E-mail">
            <button onclick="salvarCliente()">Cadastrar Cliente</button>
            
            <hr>
            <h2>Clientes Cadastrados</h2>
            <button onclick="listarClientes()" style="background: #9e9e9e;">Atualizar Lista</button>
            <table id="tabelaClientes">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>Ação</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <div class="card">
            <h2>Novo Pedido</h2>
            <input type="number" id="pedClienteId" placeholder="ID do Cliente (ex: 1)">
            <input type="text" id="pedDesc" placeholder="Descrição (ex: Café Expresso)">
            <input type="number" id="pedValor" placeholder="Valor Total">
            <input type="date" id="pedData">
            <button onclick="salvarPedido()">Enviar Pedido</button>
            <div id="msgPedido"></div>
        </div>

        <div class="card" style="width: 920px;"> <h2>Buscar Pedidos por Nome do Cliente</h2>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="buscaNome" placeholder="Digite o nome do cliente..." style="margin-bottom: 0;">
                <button onclick="buscarPedidosPorNome()" class="btn-busca" style="width: 150px; margin-bottom: 0;">Buscar</button>
            </div>
            <div id="msgBusca"></div>
            <table id="tabelaBuscaPedidos">
                <thead>
                    <tr>
                        <th>Cliente</th>
                        <th>Descrição</th>
                        <th>Valor</th>
                        <th>Data</th>
                        <th>Email</th>
                    </tr>
                </thead>
                <tbody>
                    <tr><td colspan="5" style="text-align: center; color: #999;">Nenhum pedido buscado ainda</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const API_BASE = "http://localhost:8080";

        // --- FUNÇÕES DE CLIENTE ---
        async function salvarCliente() {
            const body = {
                nome: document.getElementById('cliNome').value,
                email: document.getElementById('cliEmail').value
            };
            const res = await fetch(`${API_BASE}/clientes`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(body)
            });
            if(res.ok) alert("Cliente salvo!");
            listarClientes();
        }

        async function listarClientes() {
            const res = await fetch(`${API_BASE}/clientes`);
            const clientes = await res.json();
            const tbody = document.querySelector("#tabelaClientes tbody");
            tbody.innerHTML = "";
            clientes.forEach(c => {
                tbody.innerHTML += `
                    <tr>
                        <td><strong>${c.id}</strong></td>
                        <td>${c.nome}</td>
                        <td><button class="btn-excluir" onclick="deletarCliente(${c.id})">Excluir</button></td>
                    </tr>`;
            });
        }

        async function deletarCliente(id) {
            if (!confirm("Deseja excluir este cliente e todos os seus pedidos?")) return;
            const res = await fetch(`${API_BASE}/clientes/${id}`, { method: 'DELETE' });
            if (res.ok) {
                alert("Cliente removido!");
                listarClientes();
            }
        }

        // --- FUNÇÕES DE PEDIDO ---
        async function salvarPedido() {
            const body = {
                descricao: document.getElementById('pedDesc').value,
                valorTotal: parseFloat(document.getElementById('pedValor').value),
                datapedido: document.getElementById('pedData').value,
                cliente: { id: parseInt(document.getElementById('pedClienteId').value) }
            };
            const res = await fetch(`${API_BASE}/pedidos`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(body)
            });
            const msg = document.getElementById('msgPedido');
            if(res.ok) {
                const result = await res.json();
                msg.innerHTML = `<p style="color:green">✅ Pedido de ${result.nomeCliente} salvo!</p>`;
            } else {
                msg.innerHTML = `<p style="color:red">❌ Erro ao salvar pedido.</p>`;
            }
        }

        // --- NOVA FUNÇÃO: BUSCAR PEDIDOS ---
        async function buscarPedidosPorNome() {
            const nome = document.getElementById('buscaNome').value;
            const msgBusca = document.getElementById('msgBusca');
            const tbody = document.querySelector("#tabelaBuscaPedidos tbody");
            
            if (!nome) {
                alert("Digite um nome para buscar!");
                return;
            }

            try {
                // Chamada para a sua rota: /pedidos/listanome?nome=...
                const res = await fetch(`${API_BASE}/pedidos/listanome?nome=${encodeURIComponent(nome)}`);
                
                if (res.ok) {
                    const pedidos = await res.json();
                    tbody.innerHTML = "";
                    msgBusca.innerHTML = `<p style="color:green">Foram encontrados ${pedidos.length} pedidos.</p>`;
                    
                    pedidos.forEach(p => {
                        tbody.innerHTML += `
                            <tr>
                                <td>${p.nomeCliente}</td>
                                <td>${p.descricao}</td>
                                <td>R$ ${p.valorTotal.toFixed(2)}</td>
                                <td>${p.datapedido}</td>
                                <td>${p.emailCliente}</td>
                            </tr>`;
                    });
                } else {
                    const erro = await res.json();
                    tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;">Nenhum pedido encontrado.</td></tr>`;
                    msgBusca.innerHTML = `<p style="color:red">❌ ${erro.message || 'Erro na busca'}</p>`;
                }
            } catch (err) {
                msgBusca.innerHTML = `<p style="color:red">❌ Erro ao conectar com o servidor.</p>`;
            }
        }

        window.onload = listarClientes;
    </script>
</body>
</html>
